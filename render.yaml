services:
  # React Frontend - Static Site
  - type: web
    name: teachvault-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to the backend URL once it is created
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # CodeIgniter Backend - Web Service (Dockerized)
  - type: web
    name: teachvault-backend
    env: docker
    rootDir: backend
    plan: free # Ensure we use the free tier for Docker
    envVars:
      - key: CI_ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 86400
      - key: database.default.DBDriver
        value: MySQLi
      - key: database.default.hostname
        sync: false
      - key: database.default.database
        sync: false
      - key: database.default.username
        sync: false
      - key: database.default.password
        sync: false
      - key: database.default.port
        value: 3306
      - key: app.baseURL
        sync: false # Set this to the backend URL on Render
