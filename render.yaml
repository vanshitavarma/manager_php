databases:
  - name: teachvault-db
    plan: free # Use free tier PostgreSQL
    user: admin

services:
  # React Frontend - Static Site
  - type: web
    name: teachvault-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to the backend URL once it is created
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # CodeIgniter Backend - Web Service (Dockerized)
  - type: web
    name: teachvault-backend
    env: docker
    rootDir: backend
    plan: free # Ensure we use the free tier for Docker
    envVars:
      - key: CI_ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 86400
      - key: database.default.DBDriver
        value: Postgre
      - key: database.default.hostname
        fromDatabase:
          name: teachvault-db
          property: host
      - key: database.default.database
        fromDatabase:
          name: teachvault-db
          property: database
      - key: database.default.username
        fromDatabase:
          name: teachvault-db
          property: user
      - key: database.default.password
        fromDatabase:
          name: teachvault-db
          property: password
      - key: database.default.port
        fromDatabase:
          name: teachvault-db
          property: port
      - key: app.baseURL
        sync: false # Set this to the backend URL on Render
